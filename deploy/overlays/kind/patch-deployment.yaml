apiVersion: apps/v1
kind: Deployment
metadata:
  name: lightspeed-stack
  namespace: konflux-lightspeed
spec:
  replicas: 1
  template:
    spec:
      containers:
        - name: lightspeed-stack
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
          env:
            - name: LIGHTSPEED_STACK_CONFIG_PATH
              value: /app-root/lightspeed-stack.yaml
            - name: LIGHTSPEED_STACK_LOG_LEVEL
              value: DEBUG
            - name: SQLITE_STORE_DIR
              value: /tmp/llama-store
            - name: POSTGRES_HOST
              value: lightspeed-postgres.konflux-lightspeed.svc
            - name: POSTGRES_PORT
              value: "5432"
            - name: POSTGRES_DB
              value: lightspeed
            - name: POSTGRES_USER
              value: lightspeed
            - name: POSTGRES_PASSWORD
              value: lightspeed
            - name: GEMINI_API_KEY
              valueFrom:
                secretKeyRef:
                  name: llm-provider-credentials
                  key: GEMINI_API_KEY
                  optional: true
          resources:
            requests:
              cpu: 500m
              memory: 256Mi
            limits:
              cpu: "1"
              memory: 512Mi
          livenessProbe:
            httpGet:
              path: /liveness
              port: 8080
              scheme: HTTP
            initialDelaySeconds: 15
            periodSeconds: 10
            timeoutSeconds: 3
          readinessProbe:
            httpGet:
              path: /readiness
              port: 8080
              scheme: HTTP
            initialDelaySeconds: 10
            periodSeconds: 5
            timeoutSeconds: 3
          volumeMounts:
            - name: lightspeed-stack-config
              mountPath: /app-root/lightspeed-stack.yaml
              subPath: lightspeed-stack.yaml
              readOnly: true
            - name: run-config
              mountPath: /app-root/run.yaml
              subPath: run.yaml
              readOnly: true
            - name: system-prompt
              mountPath: /app-root/system-prompt.txt
              subPath: system-prompt.txt
              readOnly: true
            - name: llm-credentials
              mountPath: /app-root/secrets
              readOnly: true
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: lightspeed-stack-config
          configMap:
            name: lightspeed-stack-config
        - name: run-config
          configMap:
            name: run-config
        - name: system-prompt
          configMap:
            name: system-prompt
        - name: tls-certs
          secret:
            secretName: lightspeed-tls
            optional: true
        - name: llm-credentials
          secret:
            secretName: llm-provider-credentials
            optional: true
        - name: tmp
          emptyDir: {}
