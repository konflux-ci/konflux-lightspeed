apiVersion: v1
kind: Service
metadata:
  name: lightspeed-postgres
  namespace: konflux-lightspeed
  labels:
    app.kubernetes.io/name: lightspeed-postgres
    app.kubernetes.io/part-of: konflux-lightspeed
spec:
  type: ClusterIP
  ports:
    - name: postgres
      port: 5432
      targetPort: 5432
  selector:
    app.kubernetes.io/name: lightspeed-postgres
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: lightspeed-postgres
  namespace: konflux-lightspeed
  labels:
    app.kubernetes.io/name: lightspeed-postgres
    app.kubernetes.io/part-of: konflux-lightspeed
spec:
  replicas: 1
  serviceName: lightspeed-postgres
  selector:
    matchLabels:
      app.kubernetes.io/name: lightspeed-postgres
  template:
    metadata:
      labels:
        app.kubernetes.io/name: lightspeed-postgres
        app.kubernetes.io/part-of: konflux-lightspeed
    spec:
      containers:
        - name: postgres
          image: docker.io/library/postgres:16-alpine
          ports:
            - containerPort: 5432
          env:
            - name: POSTGRES_DB
              value: lightspeed
            - name: POSTGRES_USER
              value: lightspeed
            - name: POSTGRES_PASSWORD
              value: lightspeed
          volumeMounts:
            - name: data
              mountPath: /var/lib/postgresql/data
          readinessProbe:
            exec:
              command: ["pg_isready", "-U", "lightspeed", "-d", "lightspeed"]
            initialDelaySeconds: 5
            periodSeconds: 5
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 256Mi
      volumes:
        - name: data
          emptyDir: {}
